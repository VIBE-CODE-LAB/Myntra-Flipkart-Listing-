# Multi-Workbook Configuration - COMBINED (Myntra + Flipkart)
# Myntra brands use keys: komli, invisisoft, tweens, dressberry, joomie, souminie, invisifit, intimist
# Flipkart brands use keys: fk_komli, fk_invisisoft, fk_tweens, fk_dressberry, fk_joomie, fk_souminie, fk_invisifit, fk_intimist

# ============================================================================
# WORKBOOK IDs - Google Drive Spreadsheet IDs
# ============================================================================
workbooks:
  myntra_tracker:
    id: ""
    description: "Myntra Tracker (brand-specific sheets)"
    source_type: "sku"

  flipkart_tracker:
    id: ""
    description: "Flipkart Tracker (Ankita) - brand-specific sheets"
    source_type: "sku"

  belle_komli:
    id: ""
    description: "E-Com Listing Master-2026 (Belle-Komli)"
    source_type: "attributes"

  belle_invisisoft:
    id: ""
    description: "E-Com Listing Master-2026 (Belle-Invisi-Soft)"
    source_type: "attributes"

  belle_tweens:
    id: ""
    description: "E-Com Listing Master-2026 (Belle-Tweens)"
    source_type: "attributes"

  belle_joomie:
    id: ""
    description: "E-Com Listing Master-2026 (Belle-Joomie)"
    source_type: "attributes"

  belle_souminie:
    id: ""
    description: "E-Com Listing Master-2026 (Belle-Souminie)"
    source_type: "attributes"

  belle_dressberry:
    id: ""
    description: "E-Com Listing Master-2026 (Belle-Dressberry)"
    source_type: "attributes"

  belle_invisi_fit:
    id: ""
    description: "E-Com Listing Master-2026 (Belle-Invisi-Fit)"
    source_type: "attributes"

  belle_intimist:
    id: ""
    description: "E-Com Listing Master-2026 (Belle-Intimist)"
    source_type: "attributes"

# ============================================================================
# BRANDS - MYNTRA (keys: komli, invisisoft, tweens, dressberry, joomie, souminie, invisifit)
# ============================================================================
brands:
  komli:
    display_name: "Komli"
    prefix: "KB"
    sku_source:
      workbook: "myntra_tracker"
      sheet_name: "Komli>Myntra (AMC Corp)"
      article_id_column: "Komli"
    attribute_source:
      workbook: "belle_komli"
      sheet_name: "Komli::Myntra"
      article_id_column: "vendorSkuCode"
    output_folder: "data/output/komli/"

