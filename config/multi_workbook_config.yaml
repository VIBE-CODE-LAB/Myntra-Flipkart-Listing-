# ============================================================================
# JOIN AND MERGE LOGIC
# ============================================================================
join_logic:
  article_id_format: "{prefix}-{number}"
  matcher_format: "{number}"
  missing_attributes_handling: "skip"
  alert_on_missing: true

# ============================================================================
# OUTPUT CONFIGURATION
# ============================================================================
output:
  use_brand_folders: true
  create_if_missing: true

# ============================================================================
# GLOBAL SETTINGS
# ============================================================================
caching:
  enabled: false
  ttl_minutes: 10

rate_limiting:
  max_requests_per_minute: 60
  batch_read: true
  retry_on_error: true
  max_retries: 3

logging:
  level: "INFO"
  log_file: "logs/multi_workbook.log"
  verbose: true
